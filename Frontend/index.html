<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LingoBot — Tu profesor de idiomas</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1f2330;
    --border: #2a2f3d;
    --text: #e9ebf1;
    --text-dim: #9aa1b2;
    --accent: #6c8cff;
    --accent-2: #3ecf8e;
    --error: #ff6c6c;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text); height: 100vh; height: 100dvh; overflow: hidden;
  }
  #app { display: flex; height: 100vh; height: 100dvh; }

  /* Sidebar */
  #sidebar {
    width: 300px; background: var(--panel); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; flex-shrink: 0; transition: transform .25s ease;
  }
  #sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
  #sidebar-header h1 { font-size: 18px; margin: 0 0 12px; }
  #new-lang-btn {
    width: 100%; padding: 10px 14px; border-radius: var(--radius); border: none;
    background: var(--accent); color: white; font-weight: 600; font-size: 14px; cursor: pointer;
  }
  #new-lang-btn:active { opacity: .85; }
  #conv-list { flex: 1; overflow-y: auto; padding: 8px; }
  .conv-item {
    display: flex; align-items: center; gap: 10px; padding: 12px; border-radius: var(--radius);
    cursor: pointer; margin-bottom: 4px;
  }
  .conv-item:hover, .conv-item.active { background: var(--panel-2); }
  .conv-flag { font-size: 22px; }
  .conv-info { min-width: 0; flex: 1; }
  .conv-title { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-last { font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-delete {
    background: none; border: none; color: var(--text-dim); font-size: 16px; cursor: pointer;
    padding: 6px; border-radius: 8px; flex-shrink: 0;
  }
  .conv-delete:hover { color: var(--error); background: rgba(255,108,108,0.12); }

  /* Main chat */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  #chat-header {
    padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px;
    background: var(--panel);
  }
  #menu-toggle { display: none; background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; }
  #chat-title { font-weight: 700; font-size: 16px; }
  #chat-level { font-size: 12px; color: var(--text-dim); }

  #messages { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 14px; }
  .empty-state { margin: auto; text-align: center; color: var(--text-dim); max-width: 320px; }

  .bubble-row { display: flex; }
  .bubble-row.user { justify-content: flex-end; }
  .bubble {
    max-width: 78%; padding: 12px 14px; border-radius: var(--radius); font-size: 15px; line-height: 1.45;
  }
  .bubble.assistant { background: var(--panel-2); border-top-left-radius: 4px; }
  .bubble.user { background: var(--accent); color: white; border-top-right-radius: 4px; }
  .translation { margin-top: 6px; font-size: 12.5px; color: var(--text-dim); font-style: italic; }

  .corrections { margin-top: 10px; border-top: 1px dashed var(--border); padding-top: 8px; }
  .correction-item { font-size: 13px; margin-bottom: 6px; }
  .correction-item .orig { color: var(--error); text-decoration: line-through; }
  .correction-item .fixed { color: var(--accent-2); font-weight: 600; }
  .correction-item .expl { color: var(--text-dim); display: block; margin-top: 2px; }

  #composer { padding: 14px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--panel); }
  #composer input {
    flex: 1; padding: 12px 14px; border-radius: var(--radius); border: 1px solid var(--border);
    background: var(--panel-2); color: var(--text); font-size: 15px; outline: none;
  }
  #composer button {
    padding: 0 18px; border-radius: var(--radius); border: none; background: var(--accent);
    color: white; font-weight: 600; cursor: pointer;
  }

  /* Modal buscador de idiomas */
  #lang-modal {
    position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none;
    align-items: flex-start; justify-content: center; padding-top: 10vh; z-index: 50;
  }
  #lang-modal.open { display: flex; }
  #lang-box { background: var(--panel); border-radius: var(--radius); width: 90%; max-width: 420px; overflow: hidden; }
  #lang-search {
    width: 100%; padding: 16px; border: none; border-bottom: 1px solid var(--border);
    background: var(--panel); color: var(--text); font-size: 16px; outline: none;
  }
  #lang-results { max-height: 50vh; overflow-y: auto; }
  .lang-option { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; }
  .lang-option:hover { background: var(--panel-2); }
  .lang-option .flag { font-size: 24px; }
  .lang-option .names { display: flex; flex-direction: column; }
  .lang-option .name { font-size: 15px; }
  .lang-option .native { font-size: 12px; color: var(--text-dim); }

  #level-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .level-chip {
    padding: 6px 12px; border-radius: 999px; border: 1px solid var(--border); font-size: 13px;
    cursor: pointer; color: var(--text-dim);
  }
  .level-chip.selected { background: var(--accent); color: white; border-color: var(--accent); }

  @media (max-width: 720px) {
    #sidebar { position: fixed; z-index: 40; height: 100vh; transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); }
    #menu-toggle { display: block; }
  }
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="sidebar-header">
      <h1>🗣️ LingoBot</h1>
      <button id="new-lang-btn">+ Nuevo idioma</button>
    </div>
    <div id="conv-list"></div>
  </aside>

  <main id="main">
    <div id="chat-header">
      <button id="menu-toggle">☰</button>
      <div>
        <div id="chat-title">Selecciona o crea una conversación</div>
        <div id="chat-level"></div>
      </div>
    </div>
    <div id="messages"><div class="empty-state">Elige un idioma con "+ Nuevo idioma" para empezar tu primera clase.</div></div>
    <div id="composer">
      <input id="msg-input" type="text" placeholder="Escribe tu respuesta..." disabled>
      <button id="send-btn" disabled>Enviar</button>
    </div>
  </main>
</div>

<div id="lang-modal">
  <div id="lang-box">
    <input id="lang-search" type="text" placeholder="Buscar idioma (ej. francés, 日本語, de)...">
    <div id="lang-results"></div>
    <div id="level-row"></div>
  </div>
</div>

<script>
const API = "https://lingobot-jpio.onrender.com/api";
//const API = "http://localhost:8000/api"; // cambia por la URL de tu backend desplegado

let conversations = [];
let activeConvId = null;
let selectedLangForModal = null;
const LEVELS = ["A1","A2","B1","B2","C1","C2"];
let selectedLevel = "A2";

const el = (id) => document.getElementById(id);

// ---------- Sidebar / historial ----------
async function loadConversations() {
  const res = await fetch(`${API}/conversations`);
  conversations = await res.json();
  renderConvList();
}

function renderConvList() {
  const list = el("conv-list");
  list.innerHTML = "";
  if (conversations.length === 0) {
    list.innerHTML = `<div style="padding:16px;color:var(--text-dim);font-size:13px;">Aún no tienes conversaciones.</div>`;
    return;
  }
  conversations.forEach(c => {
    const div = document.createElement("div");
    div.className = "conv-item" + (c.id === activeConvId ? " active" : "");
    div.innerHTML = `
      <div class="conv-flag">${c.flag}</div>
      <div class="conv-info">
        <div class="conv-title">${c.title}</div>
        <div class="conv-last">${c.last_message ? c.last_message.slice(0, 40) : "Sin mensajes aún"}</div>
      </div>
      <button class="conv-delete" title="Eliminar conversación">🗑</button>`;
    div.onclick = () => openConversation(c.id);
    div.querySelector(".conv-delete").onclick = (e) => {
      e.stopPropagation(); // que no dispare también openConversation
      deleteConversation(c.id);
    };
    list.appendChild(div);
  });
}

async function deleteConversation(id) {
  const conv = conversations.find(c => c.id === id);
  const ok = confirm(`¿Eliminar la conversación de ${conv ? conv.language_name : "este idioma"}? Esta acción no se puede deshacer.`);
  if (!ok) return;

  await fetch(`${API}/conversations/${id}`, { method: "DELETE" });

  if (activeConvId === id) {
    activeConvId = null;
    el("chat-title").textContent = "Selecciona o crea una conversación";
    el("chat-level").textContent = "";
    el("msg-input").disabled = true;
    el("send-btn").disabled = true;
    el("messages").innerHTML = `<div class="empty-state">Elige un idioma con "+ Nuevo idioma" para empezar tu primera clase.</div>`;
  }
  await loadConversations();
}

async function openConversation(id) {
  activeConvId = id;
  el("sidebar").classList.remove("open");
  renderConvList();
  const conv = conversations.find(c => c.id === id);
  el("chat-title").textContent = `${conv.flag} ${conv.language_name}`;
  el("chat-level").textContent = `Nivel ${conv.level}`;
  el("msg-input").disabled = false;
  el("send-btn").disabled = false;

  const res = await fetch(`${API}/conversations/${id}/messages`);
  const messages = await res.json();
  renderMessages(messages);
}

function renderMessages(messages) {
  const box = el("messages");
  box.innerHTML = "";
  if (messages.length === 0) {
    box.innerHTML = `<div class="empty-state">Escribe algo para empezar a practicar.</div>`;
    return;
  }
  messages.forEach(addMessageBubble);
  box.scrollTop = box.scrollHeight;
}

function addMessageBubble(m) {
  const box = el("messages");
  const row = document.createElement("div");
  row.className = "bubble-row " + (m.role === "user" ? "user" : "assistant");
  const bubble = document.createElement("div");
  bubble.className = "bubble " + (m.role === "user" ? "user" : "assistant");
  bubble.innerHTML = `<div>${escapeHtml(m.content)}</div>`;

  if (m.reply_translation_es) {
    bubble.innerHTML += `<div class="translation">${escapeHtml(m.reply_translation_es)}</div>`;
  }
  if (m.corrections && m.corrections.length > 0) {
    let html = `<div class="corrections">`;
    m.corrections.forEach(c => {
      html += `<div class="correction-item">
        <span class="orig">${escapeHtml(c.original)}</span> →
        <span class="fixed">${escapeHtml(c.corrected)}</span>
        <span class="expl">${escapeHtml(c.explanation_es || "")}</span>
      </div>`;
    });
    html += `</div>`;
    bubble.innerHTML += html;
  }
  row.appendChild(bubble);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}

function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

// ---------- Envío de mensajes ----------
el("send-btn").onclick = sendMessage;
el("msg-input").addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });

async function sendMessage() {
  const input = el("msg-input");
  const text = input.value.trim();
  if (!text || !activeConvId) return;
  input.value = "";
  addMessageBubble({ role: "user", content: text });

  const res = await fetch(`${API}/conversations/${activeConvId}/messages`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ content: text }),
  });
  const data = await res.json();
  addMessageBubble({
    role: "assistant",
    content: data.reply,
    reply_translation_es: data.reply_translation_es,
    corrections: data.corrections,
  });
  loadConversations();
}

// ---------- Modal: nuevo idioma ----------
el("new-lang-btn").onclick = () => {
  el("lang-modal").classList.add("open");
  el("lang-search").value = "";
  el("lang-search").focus();
  searchLanguages("");
  renderLevelChips();
};
el("lang-modal").addEventListener("click", (e) => {
  if (e.target.id === "lang-modal") el("lang-modal").classList.remove("open");
});

let searchTimeout;
el("lang-search").addEventListener("input", (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => searchLanguages(e.target.value), 150);
});

async function searchLanguages(q) {
  const res = await fetch(`${API}/languages?q=${encodeURIComponent(q)}`);
  const results = await res.json();
  const box = el("lang-results");
  box.innerHTML = "";
  results.forEach(l => {
    const div = document.createElement("div");
    div.className = "lang-option";
    div.innerHTML = `<div class="flag">${l.flag}</div>
      <div class="names"><div class="name">${l.name}</div><div class="native">${l.native}</div></div>`;
    div.onclick = () => createConversation(l.code);
    box.appendChild(div);
  });
}

function renderLevelChips() {
  const row = el("level-row");
  row.innerHTML = `<div style="width:100%;font-size:12px;color:var(--text-dim);margin-bottom:4px;">Nivel de partida:</div>`;
  LEVELS.forEach(lv => {
    const chip = document.createElement("div");
    chip.className = "level-chip" + (lv === selectedLevel ? " selected" : "");
    chip.textContent = lv;
    chip.onclick = () => { selectedLevel = lv; renderLevelChips(); };
    row.appendChild(chip);
  });
}

async function createConversation(code) {
  const res = await fetch(`${API}/conversations`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ language_code: code, level: selectedLevel }),
  });
  const conv = await res.json();
  el("lang-modal").classList.remove("open");
  await loadConversations();
  openConversation(conv.id);
}

// ---------- Menú móvil ----------
el("menu-toggle").onclick = () => el("sidebar").classList.toggle("open");

// ---------- Init ----------
loadConversations();
</script>
</body>
</html>
